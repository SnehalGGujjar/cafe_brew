{% extends "admin/base_site.html" %}
{% load static %}
{% block extrastyle %}
<style>
  body {
    position: relative;
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background: url("{% static 'images/admin_bg.jpg' %}") no-repeat center center/cover;
    overflow: hidden;
  }

  /* Blurred overlay */
  body::before {
    content: "";
    position: absolute;
    inset: 0;
    background: inherit;
    filter: blur(8px);
    transform: scale(1.05);
    z-index: 0;
  }

  .custom-admin-welcome {
    position: relative;
    z-index: 1;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(4px);
    border-radius: 16px;
    padding: 2rem 3rem;
    margin: 5% auto;
    max-width: 700px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
  }

  .custom-admin-welcome h1 {
    font-size: 2.2rem;
    color: #1a1a1a;
    margin-bottom: 1rem;
  }

  .custom-admin-welcome p {
    font-size: 1.1rem;
    color: #333;
  }

  .custom-admin-welcome a.button {
    display: inline-block;
    padding: 0.7rem 1.2rem;
    margin-top: 1rem;
    background: #417690;
    color: white;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
    transition: background 0.3s;
  }

  .custom-admin-welcome a.button:hover {
    background: #2f5d72;
  }
</style>
{% endblock %}

{% block content %}
  <div class="custom-admin-welcome">
    <h1>Welcome to Admin</h1>
    <p><a class="button" href="{% url 'admin_analytics' %}">📊 View Analytics Dashboard</a></p>
    {{ block.super }}
  </div>
{% endblock %}
